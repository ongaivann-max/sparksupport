<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="app" class="h-full flex items-center justify-center bg-gradient-to-br from-green-50 to-emerald-100">
        <!-- Login Form -->
        <div id="loginForm" class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full mx-auto flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 8H5a2 2 0 00-2 2v7a2 2 0 002 2h14a2 2 0 002-2v-7a2 2 0 00-2-2zm0 0V9a2 2 0 00-2-2h-2a2 2 0 00-2-2h-2a2 2 0 00-2 2H7a2 2 0 00-2 2v-1m0 11h2m12 0h2M9 17a1 1 0 11-2 0 1 1 0 012 0m6 0a1 1 0 11-2 0 1 1 0 012 0" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-green-800 mb-2">Sign In</h1>
                <p class="text-gray-600">Enter your credentials to continue</p>
            </div>

            <form onsubmit="handleLogin(event)" class="space-y-6">
                <div>
                    <label for="email" class="block text-green-800 mb-2 font-medium">
                        Email Address
                    </label>
                    <input
                        id="email"
                        type="email"
                        placeholder="you@example.com"
                        required
                        class="w-full px-4 py-3 border-2 border-green-200 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all duration-200"
                    />
                </div>

                <div>
                    <label for="password" class="block text-green-800 mb-2 font-medium">
                        Password
                    </label>
                    <input
                        id="password"
                        type="password"
                        placeholder="••••••••"
                        required
                        class="w-full px-4 py-3 border-2 border-green-200 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200 transition-all duration-200"
                    />
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center">
                        <input type="checkbox" class="w-4 h-4 text-green-600 border-green-300 rounded focus:ring-green-500" />
                        <span class="ml-2 text-sm text-gray-600">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-green-600 hover:text-green-700">Forgot password?</a>
                </div>

                <button
                    type="submit"
                    class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg hover:from-green-600 hover:to-emerald-700 transition-all duration-200 shadow-lg hover:shadow-xl font-medium"
                >
                    Sign In
                </button>
            </form>

            
        </div>

        <!-- Success Screen (hidden by default) -->
        <div id="successScreen" class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md text-center hidden">
            <div class="mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-full mx-auto flex items-center justify-center mb-4">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-green-800 mb-2">Welcome!</h1>
                <p class="text-gray-600">You have successfully logged in</p>
            </div>
            <div class="bg-green-50 rounded-lg p-4 mb-6">
                <p class="text-green-800">
                    <span class="opacity-60">Email:</span> <span id="userEmail"></span>
                </p>
            </div>
            <button
                onclick="window.location.href = 'src/index.html'"
                class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-lg hover:from-green-600 hover:to-emerald-700 transition-all duration-200 shadow-lg hover:shadow-xl font-medium"
            >
                Continue
            </button>
            <button
                onclick="handleLogout()"
                class="w-full mt-3 bg-gray-300 text-gray-800 py-3 rounded-lg hover:bg-gray-400 transition-all duration-200 font-medium"
            >
                Logout
            </button>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (email && password) {
                document.getElementById('userEmail').textContent = email;
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('successScreen').classList.remove('hidden');
            }
        }

        function handleLogout() {
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('successScreen').classList.add('hidden');
        }
    </script>
</body>
</html>
